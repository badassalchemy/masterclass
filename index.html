const STORAGE_KEY = "quantumqueen-module3-v1";

function App() {
  const [theme, setTheme] = useState("dark");
  const [active, setActive] = useState(0);
  const [done, setDone] = useState({});
  const [journals, setJournals] = useState({});
  const [mobileNav, setMobileNav] = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [selectedMethod, setSelectedMethod] = useState("");
  const [trackerDays, setTrackerDays] = useState({});

  const C = theme === "dark" ? DARK : LIGHT;

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const s = JSON.parse(raw);
        if (s.theme) setTheme(s.theme);
        if (s.done) setDone(s.done);
        if (s.journals) setJournals(s.journals);
        if (s.selectedMethod) setSelectedMethod(s.selectedMethod);
        if (s.trackerDays) setTrackerDays(s.trackerDays);
      }
    } catch (err) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ theme, done, journals, selectedMethod, trackerDays }));
    } catch (err) {}
  }, [theme, done, journals, selectedMethod, trackerDays, loaded]);

  const toggleTheme = () => setTheme(theme === "dark" ? "light" : "dark");
  const toggleDone = (i) => setDone({ ...done, [i]: !done[i] });
  const toggleDay = (day) => setTrackerDays({ ...trackerDays, [day]: !trackerDays[day] });

  const updateJournal = (fieldId, text) => {
    const existing = journals[fieldId] || {};
    setJournals({ ...journals, [fieldId]: { text, savedAt: existing.savedAt } });
  };

  const getAllFieldIds = (lesson) => {
    const ids = [];
    if (lesson.journals) lesson.journals.forEach(j => ids.push(j.id));
    if (lesson.excavationFields) lesson.excavationFields.forEach(f => ids.push(f.id));
    if (lesson.beliefInquirySet) {
      for (let i = 1; i <= 3; i++) {
        ids.push("belief-" + lesson.id + "-" + i);
        lesson.beliefInquirySet.questions.forEach(q => ids.push("belief-" + lesson.id + "-" + i + "-" + q.suffix));
      }
    }
    if (lesson.reframeFields) lesson.reframeFields.forEach(r => r.fields.forEach(f => ids.push(f.id)));
    if (lesson.declarationsBlock) lesson.declarationsBlock.fields.forEach(f => ids.push(f.id));
    if (lesson.trackerReflectionFields) lesson.trackerReflectionFields.forEach(f => ids.push(f.id));
    return ids;
  };

  const saveLessonJournals = () => {
    const stamp = new Date().toISOString();
    const next = { ...journals };
    const lesson = MODULE_DATA.lessons[active];
    const ids = getAllFieldIds(lesson);
    ids.forEach(id => {
      if (next[id] && next[id].text) next[id] = { ...next[id], savedAt: stamp };
    });
    setJournals(next);
    setSaveStatus("Saved ✦");
    setTimeout(() => setSaveStatus(""), 2000);
  };

  const getEntries = (lesson) => {
    const out = [];
    if (lesson.journals) lesson.journals.forEach(j => {
      const en = journals[j.id];
      if (en && en.text) out.push({ prompt: j.prompt, text: en.text });
    });
    if (lesson.excavationFields) lesson.excavationFields.forEach(f => {
      const en = journals[f.id];
      if (en && en.text) out.push({ prompt: f.prompt, text: en.text });
    });
    if (lesson.beliefInquirySet) {
      for (let i = 1; i <= 3; i++) {
        const beliefId = "belief-" + lesson.id + "-" + i;
        const bEn = journals[beliefId];
        if (bEn && bEn.text) {
          out.push({ prompt: "Belief " + i + " — " + lesson.beliefInquirySet.beliefLabel, text: bEn.text });
          lesson.beliefInquirySet.questions.forEach(q => {
            const qEn = journals[beliefId + "-" + q.suffix];

    a.href = url;

    URL.revokeObjectURL(url);

                    <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: "#3A1E33", textTransform: "uppercase", marginBottom: 6 }}>✦ {lesson.declarationsBlock.intro}</div>
                    <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontWeight: 700, fontSize: 20, color: "#FFFFFF", marginBottom: 18, lineHeight: 1.35 }}>{lesson.declarationsBlock.subIntro}</div>
                    {lesson.declarationsBlock.fields.map(f => (
                      <div key={f.id} style={{ marginBottom: 12 }}>
                        <div style={{ fontWeight: 700, fontSize: 10, color: "#2A1424", marginBottom: 6, letterSpacing: 1.5, textTransform: "uppercase" }}>{f.label}</div>
                        <textarea
                          value={(journals[f.id] && journals[f.id].text) || ""}
                          onChange={(ev) => updateJournal(f.id, ev.target.value)}
                          placeholder={f.placeholder}
                          rows={2}
                          style={{ width: "100%", background: "rgba(255,255,255,0.92)", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 10, padding: "12px 14px", fontSize: 14, color: "#2A1424", lineHeight: 1.6, resize: "vertical", fontWeight: 600 }}
                        />
                      </div>
                    ))}
                  </div>
                )}

                <SaveExportButtons onSave={saveLessonJournals} onExport={() => exportLesson(lesson)} C={C} saveLabel="✦ Save Reframe + Declarations" />
                <div style={{ fontWeight: 500, fontSize: 11, color: C.txtFaded, lineHeight: 1.7, marginTop: 14, letterSpacing: 0.3 }}>
                  Carry your five declarations into Lesson 6 — the 21-Day Activation.
                </div>
              </div>
            )}

            {/* 21-DAY TRACKER */}
            {lesson.type === "tracker" && (
              <div style={{ marginBottom: 36 }}>

                {/* DECLARATIONS DISPLAY */}
                <SectionHeader icon="✨" label="Your Five Declarations" color={C.accent} />
                <div style={{ background: C.bgCard, borderRadius: 14, border: "1px solid " + C.border, padding: 22, marginBottom: 28, boxShadow: theme === "light" ? C.shadow : "none" }}>
                  {["dec-1", "dec-2", "dec-3", "dec-4", "dec-5"].map((id, i) => {
                    const dec = journals[id];
                    const text = (dec && dec.text) ? dec.text : null;
                    return (
                      <div key={id} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "10px 0", borderBottom: i < 4 ? "1px solid " + C.border : "none" }}>
                        <div style={{ fontSize: 11, fontWeight: 800, color: C.accent, letterSpacing: 1, minWidth: 22, marginTop: 2 }}>0{i + 1}</div>
                        <div style={{ flex: 1, fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontSize: 17, fontWeight: 700, color: text ? (theme === "dark" ? C.detail : C.accent) : C.txtFaded, lineHeight: 1.45 }}>
                          {text || "Write your declaration in Lesson 5 — The Reframe."}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* METHOD SELECT */}
                <SectionHeader icon="⭐" label="Choose Your Practice Method" color={C.accent} />
                <div style={{ marginBottom: 28 }}>
                  {lesson.practiceMethods.map(m => {
                    const isSelected = selectedMethod === m.title;
                    return (
                      <div key={m.id} onClick={() => setSelectedMethod(m.title)} style={{
                        background: isSelected ? BRAND_GRAD : C.bgCard,
                        borderRadius: 14,
                        border: "1px solid " + (isSelected ? "rgba(255,255,255,0.25)" : C.border),
                        padding: "18px 22px", marginBottom: 10, cursor: "pointer",
                        boxShadow: theme === "light" ? (isSelected ? "0 6px 20px rgba(110,56,101,0.2)" : "0 2px 8px rgba(110,56,101,0.06)") : "none",
                        transition: "all .2s"
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                          <div style={{ width: 22, height: 22, minWidth: 22, borderRadius: "50%", background: isSelected ? "rgba(255,255,255,0.95)" : "transparent", border: isSelected ? "none" : "1.5px solid " + C.borderMid, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            {isSelected && <div style={{ width: 10, height: 10, borderRadius: "50%", background: MAUVE_DEEP }} />}
                          </div>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontWeight: 700, fontSize: 18, color: isSelected ? "#FFFFFF" : (theme === "dark" ? C.detail : C.accent), marginBottom: 4 }}>{m.title}</div>
                            <div style={{ fontWeight: 500, fontSize: 13, color: isSelected ? "#2A1424" : C.txtSec, lineHeight: 1.6 }}>{m.desc}</div>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 21 DAY TRACKER GRID */}
                <SectionHeader icon="🌙" label="Your 21-Day Tracker" color={C.accent} status={Object.values(trackerDays).filter(Boolean).length + " of 21"} />
                <div style={{ background: C.bgCard, borderRadius: 14, border: "1px solid " + C.border, padding: 24, marginBottom: 28, boxShadow: theme === "light" ? C.shadow : "none" }}>
                  <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontWeight: 700, fontSize: 17, color: theme === "dark" ? C.detail : C.accent, marginBottom: 6, lineHeight: 1.4 }}>Tap each day after you complete your practice.</div>
                  <div style={{ fontWeight: 500, fontSize: 12, color: C.txtMuted, lineHeight: 1.6, fontStyle: "italic", marginBottom: 20 }}>
                    If you miss a day, do not start over. The Queen does not punish herself for being human.
                  </div>
                  <div className="tracker-grid" style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 8, marginBottom: 14 }}>
                    {Array.from({ length: 21 }, (_, i) => {
                      const day = i + 1;
                      const isChecked = !!trackerDays[day];
                      return (
                        <div key={day} onClick={() => toggleDay(day)} style={{
                          aspectRatio: "1",
                          borderRadius: 12,
                          background: isChecked ? "linear-gradient(135deg," + MAUVE_LIGHT + "," + MAUVE_DEEP + ")" : "transparent",
                          border: "1.5px solid " + (isChecked ? "transparent" : C.borderMid),
                          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                          cursor: "pointer",
                          transition: "all .2s",
                          minHeight: 56
                        }}>
                          <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: isChecked ? "rgba(255,255,255,0.85)" : C.txtFaded, textTransform: "uppercase", marginBottom: 2 }}>Day</div>
                          <div style={{ fontSize: 18, fontWeight: 700, color: isChecked ? "#FFFFFF" : C.txtMuted, fontFamily: "'Cormorant Garamond',serif" }}>{day}</div>
                          {isChecked && <div style={{ fontSize: 10, color: "#FFFFFF", marginTop: 2 }}>✓</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ marginTop: 20, paddingTop: 18, borderTop: "1px solid " + C.border, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14, flexWrap: "wrap" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg," + C.accent + "," + C.accentLt + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, fontWeight: 700, color: "#FFFFFF", fontFamily: "'Cormorant Garamond',serif" }}>
                        {Object.values(trackerDays).filter(Boolean).length}
                      </div>
                      <div>
                        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.5, color: C.accent, textTransform: "uppercase" }}>Days Activated</div>
                        <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontSize: 14, color: C.txtSec, marginTop: 2 }}>
                          {Object.values(trackerDays).filter(Boolean).length === 21 ? "You did it, Queen." : Object.values(trackerDays).filter(Boolean).length >= 14 ? "The final week — stay." : Object.values(trackerDays).filter(Boolean).length >= 7 ? "She is starting to feel familiar." : Object.values(trackerDays).filter(Boolean).length >= 1 ? "You have started." : "Begin when you are ready."}
                        </div>
                      </div>
                    </div>
                    {Object.values(trackerDays).filter(Boolean).length > 0 && (
                      <button onClick={() => { if (window.confirm("Reset all 21 days? This cannot be undone.")) setTrackerDays({}); }} style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: C.txtMuted, background: "transparent", padding: "9px 16px", borderRadius: 50, border: "1px solid " + C.borderMid, cursor: "pointer", textTransform: "uppercase" }}>Reset Tracker</button>
                    )}
                  </div>
                </div>

                {/* WEEKLY REFLECTIONS */}
                <SectionHeader icon="🔮" label="Weekly Reflections" color={C.accent} status={saveStatus} />
                {lesson.trackerReflectionFields.map(f => {
                  const entry = journals[f.id];
                  return (
                    <div key={f.id} style={{ background: C.bgCard, borderRadius: 14, border: "1px solid " + C.border, padding: 22, marginBottom: 14, boxShadow: theme === "light" ? C.shadow : "none" }}>
                      <div style={{ fontFamily: "'Cormorant Garamond',serif", fontStyle: "italic", fontWeight: 700, fontSize: 17, color: theme === "dark" ? C.detail : C.accent, marginBottom: 6, lineHeight: 1.4 }}>{f.prompt}</div>
                      {entry && entry.savedAt && (
                        <div style={{ fontSize: 8, fontWeight: 700, color: C.txtFaded, letterSpacing: 1, marginBottom: 12, textTransform: "uppercase" }}>Last saved {new Date(entry.savedAt).toLocaleString()}</div>
                      )}
                      <textarea
                        value={(entry && entry.text) || ""}
                        onChange={(ev) => updateJournal(f.id, ev.target.value)}
                        placeholder="What is true at this point in the practice?"
                        rows={5}
                        style={{ width: "100%", background: C.inputBg, border: "1px solid " + C.border, borderRadius: 10, padding: "14px 16px", fontSize: 13.5, color: C.txtSec, lineHeight: 1.75, resize: "vertical", marginTop: 8 }}
                      />
                    </div>
                  );
                })}
                <SaveExportButtons onSave={saveLessonJournals} onExport={() => exportLesson(lesson)} C={C} saveLabel="✦ Save Reflections" />
                <div style={{ fontWeight: 500, fontSize: 11, color: C.txtFaded, lineHeight: 1.7, marginTop: 14, letterSpacing: 0.3 }}>
                  On Day 21, carry your activated declarations into Module 4. You will be a different woman than the one who started.
                </div>
              </div>
            )}

            <div style={{ marginTop: 44, paddingTop: 28, borderTop: "1px solid " + C.border, display: "flex", gap: 12, justifyContent: "space-between", alignItems: "center" }} className="lesson-bottom">
              {active > 0 ? (
                <button onClick={() => setActive(active - 1)} style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: C.txtMuted, background: "transparent", padding: "12px 22px", borderRadius: 50, border: "1px solid " + C.borderMid, cursor: "pointer", textTransform: "uppercase" }}>← Previous</button>
              ) : <span />}
              {active < MODULE_DATA.lessons.length - 1 && (
                <button onClick={() => setActive(active + 1)} style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1, color: C.moonPrl, background: "linear-gradient(135deg," + C.accent + "," + C.darkMid + ")", padding: "13px 24px", borderRadius: 50, border: "none", cursor: "pointer", textTransform: "uppercase" }}>Next Lesson →</button>
              )}
            </div>

            <div style={{ marginTop: 56, paddingTop: 28, borderTop: "1px solid " + C.border, textAlign: "center" }}>
              <div style={{ fontFamily: "'Cormorant Garamond',serif", fontSize: 18, fontStyle: "italic", color: C.accent, marginBottom: 6 }}>You are the alchemy.</div>
              <div style={{ fontSize: 8, fontWeight: 700, color: C.txtFaded, letterSpacing: 2, textTransform: "uppercase" }}>Badass Alchemy · Baddie Society · Quantum Queen</div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

function SectionHeader({ icon, label, color, status }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
      <span style={{ fontSize: 16 }}>{icon}</span>
      <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, color: color, textTransform: "uppercase" }}>{label}</span>
      {status && <span style={{ marginLeft: "auto", fontSize: 9, fontWeight: 700, letterSpacing: 1, color: color }}>{status}</span>}
    </div>
  );
}

function SaveExportButtons({ onSave, onExport, C, saveLabel }) {
  return (
    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 4 }}>
      <button onClick={onSave} style={{ flex: 1, minWidth: 120, fontSize: 10, fontWeight: 700, letterSpacing: 1, color: C.moonPrl, background: "linear-gradient(135deg," + C.accent + "," + C.darkMid + ")", padding: "12px 20px", borderRadius: 50, border: "none", cursor: "pointer", textTransform: "uppercase" }}>{saveLabel}</button>
      <button onClick={onExport} style={{ flex: 1, minWidth: 120, fontSize: 10, fontWeight: 700, letterSpacing: 1, color: C.txt, background: "transparent", padding: "11px 20px", borderRadius: 50, border: "1px solid " + C.borderMid, cursor: "pointer", textTransform: "uppercase" }}>⬇ Download .txt</button>
    </div>
  );
}

// Mount
document.getElementById('loading').style.display = 'none';
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

</body>
</html>
